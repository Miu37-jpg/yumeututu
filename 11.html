<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私の日記</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    background: linear-gradient(120deg, #000428, #004e92);
    font-family: "Noto Serif JP", serif;
    color: white;
    overflow: hidden;
    opacity: 0;
    animation: fadeInScene 3.5s ease forwards;
  }

  
  .noise {
    position: fixed;
    inset: 0;
    z-index: 999;
    pointer-events: none;
    background: repeating-radial-gradient(circle at center, #fff 0%, #000 2%);
    opacity: 0.9;
    mix-blend-mode: screen;
    animation:
      tvNoise 0.18s steps(8) infinite,
      noiseFadeOut 1.8s ease-out forwards;
  }

  
  .scanline {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.03) 0px,
      rgba(0,0,0,0.05) 2px
    );
    animation: scanMove 2s linear infinite;
    z-index: 998;
  }

  
  .vhs-warp {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 997;
    animation: vhsWarp 6s infinite linear alternate;
  }

  @keyframes tvNoise {
    0% { background-position: 0 0; filter: brightness(700%) contrast(900%) grayscale(100%); }
    25% { background-position: 20px 40px; }
    50% { background-position: -40px -10px; }
    75% { background-position: 50px 20px; }
    100% { background-position: 0 0; }
  }

  
  @keyframes noiseFadeOut {
    0% { opacity: 0.9; }
    30% { opacity: 0.6; }
    60% { opacity: 0.3; }
    90% { opacity: 0.1; }
    100% { opacity: 0; }
  }

  @keyframes scanMove {
    0% { transform: translateY(-100%); opacity: 0.15; }
    50% { opacity: 0.25; }
    100% { transform: translateY(100%); opacity: 0.1; }
  }

  @keyframes vhsWarp {
    0% { transform: skewX(0deg); filter: hue-rotate(0deg); }
    15% { transform: skewX(2deg); filter: hue-rotate(10deg); }
    30% { transform: skewX(-1.5deg); filter: hue-rotate(-15deg); }
    45% { transform: skewX(1deg); filter: hue-rotate(15deg); }
    60% { transform: skewX(-2deg); filter: hue-rotate(0deg); }
    100% { transform: skewX(0deg); filter: none; }
  }

  @keyframes fadeInScene {
    0% { opacity: 0; filter: brightness(400%) contrast(300%); }
    40% { opacity: 0.4; filter: brightness(200%) contrast(150%); }
    100% { opacity: 1; filter: none; }
  }

  h1 {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 2rem;
    letter-spacing: 0.1em;
  }

  .button-group {
    display: flex;
    flex-direction: row;
    gap: 30px;
    margin-left: 6%;
  }

  .next-btn {
    padding: 15px 40px;
    font-size: 1.2rem;
    border: 2px solid white;
    background: transparent;
    color: white;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.4s ease;
    letter-spacing: 0.1em;
  }

  .next-btn:hover {
    background: white;
    color: #004e92;
    transform: scale(1.05);
  }

  .top-links {
    position: absolute;
    top: 25px;
    right: 40px;
    display: flex;
    gap: 35px;
  }

  .link-btn {
    position: relative;
    font-size: 1rem;
    color: #ffffffcc;
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.3s ease;
  }

  .link-btn::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 1px;
    background: white;
    transition: width 0.4s ease;
    opacity: 0.8;
  }

  .link-btn:hover {
    color: #fff;
  }

  .link-btn:hover::after {
    width: 100%;
  }
  
  
</style>
</head>
<body>

  <h1>私の日記</h1>

  <div class="button-group">
    <button class="next-btn" onclick="goNext('12.html')">書く</button>
  </div>

  <div class="top-links">
    <a href="index.html" class="link-btn">initial</a>
    <a href="concept.html" class="link-btn">concept</a>
    <a href="11.html" class="link-btn">diary</a>
  </div>

  <script>
    function goNext(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
