<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夢日記</title>
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 60px 15%;
      background: linear-gradient(to bottom, #0b0c2b, #1a1a40);
      color: #ddd;
      font-family: 'Patrick Hand', cursive;
      line-height: 2;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(11,12,43,0.85);
      border-bottom: 1px solid #333;
      padding: 10px 15%;
      box-sizing: border-box;
      color: #eee;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 1.9em;
      font-weight: normal;
      letter-spacing: 0.09em;
    }

    main {
      margin-top: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    article {
      margin-bottom: 71px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
    }

    h2 {
      font-size: 2.2em;
      color: #aaa;
      margin-bottom: 1.9em;
      font-weight: normal;
    }

    p {
      font-size: 1.4em;
      margin: 0.5em;
    }

   
    span {
      opacity: 0;
      display: inline-block;
      transform: translate(0px, 8px);
      transition: opacity 0.08s ease, transform 0.08s ease;
    }

    span.visible {
      opacity: 1;
      animation: float 4s ease-in-out infinite alternate,
                 fadeInOut 5s ease-in-out infinite alternate;
    }

    @keyframes float {
      0% { transform: translate(0px, 0px); }
      25% { transform: translate(-2px, -3px); }
      50% { transform: translate(2px, -4px); }
      75% { transform: translate(-1px, 2px); }
      100% { transform: translate(1px, 0px); }
    }

    @keyframes fadeInOut {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    a.back {
      display: inline-block;
      margin-top: 30px;
      color: #ccc;
      text-decoration: none;
      border: 1px solid #555;
      padding: 6px 20px;
      border-radius: 20px;
      transition: all 0.3s ease;
    }

    a.back:hover {
      background: #444;
      color: #fff;
    }

    footer {
      margin-top: 50px;
      text-align: center;
      font-size: 0.8em;
      color: #555;
    }
  </style>
</head>
<body>

  <header>
    <h1>交錯</h1>
  </header>

  <main>
    <article>
      <h2>６日目</h2>
      <p class="diary-text">朝、１９４２が私に声をかけた。</p>
      <p class="diary-text">「おはよう」。</p>
      <p class="diary-text">音波が届く前に、私は応じた。</p>
      <p class="diary-text">声は、彼女と同じ高さだった。</p>
      <p class="diary-text">午後、空間が繰り返されている。</p>
      <p class="diary-text">街の構造がループし、同じ窓、同じ通り、同じ表情。</p>
      <p class="diary-text">夜、机上に紙。</p>
      <p class="diary-text">「あと二歩」と記載。</p>
      <p class="diary-text">筆跡、１９４２のものに一致。</p>
      <p class="diary-text">境界、臨界点に近づく。</p>
    </article>

    
    <a class="back" onclick="history.back()">覚ます</a>
  </main>
  <footer>
    &copy; １９４２
  </footer>

  <script>
    
    document.querySelectorAll('.diary-text').forEach(p => {
      const text = p.textContent;
      p.textContent = '';
      text.split('').forEach((char,i) => {
        const span = document.createElement('span');
        span.textContent = char;
        
        span.style.animationDuration = (2.5 + Math.random()*2) + 's';
        span.style.animationDelay = (Math.random()*1.5) + 's';
        p.appendChild(span);
      });
    });

    const allSpans = document.querySelectorAll('.diary-text span');
    let index = 0;
    function showNextChar() {
      if (index < allSpans.length) {
        allSpans[index].classList.add('visible');
        index++;
        setTimeout(showNextChar, 80);
      }
    }
    window.addEventListener('DOMContentLoaded', showNextChar);
  </script>

</body>
</html>
