<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>１９２６の記録</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      background: linear-gradient(120deg, #000428, #004e92);
      font-family: "Noto Serif JP", serif;
      color: white;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      background: repeating-radial-gradient(circle at center, #fff 0%, #000 2%);
      opacity: 0.9;
      mix-blend-mode: screen;
      animation:
        tvNoise 0.18s steps(8) infinite,
        noiseFadeOut 1.8s ease-out forwards;
    }

    .scanline {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(0,0,0,0.05) 2px
      );
      animation: scanMove 2s linear infinite;
      z-index: 998;
    }

    .vhs-warp {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 997;
      animation: vhsWarp 6s infinite linear alternate;
    }

    @keyframes tvNoise {
      0% { background-position: 0 0; filter: brightness(700%) contrast(900%) grayscale(100%); }
      25% { background-position: 20px 40px; }
      50% { background-position: -40px -10px; }
      75% { background-position: 50px 20px; }
      100% { background-position: 0 0; }
    }

    @keyframes noiseFadeOut {
      0% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    @keyframes scanMove {
      0% { transform: translateY(-100%); opacity: 0.15; }
      100% { transform: translateY(100%); opacity: 0.1; }
    }

    @keyframes vhsWarp {
      0% { transform: skewX(0deg); filter: hue-rotate(0deg); }
      30% { transform: skewX(-1.5deg); filter: hue-rotate(-15deg); }
      60% { transform: skewX(1deg); filter: hue-rotate(10deg); }
      100% { transform: skewX(0deg); filter: none; }
    }

    h1 {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2rem;
      letter-spacing: 0.1em;
      animation: breathe 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%   { transform: translateX(-50%) translateY(0); }
      50%  { transform: translateX(-50%) translateY(-5px); }
      100% { transform: translateX(-50%) translateY(0); }
    }

    .button-group {
      display: flex;
      gap: 30px;
      margin-left: 6%;
    }

    .next-btn {
      padding: 15px 40px;
      font-size: 1.2rem;
      border: 2px solid white;
      background: transparent;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.4s ease;
      animation: float 10s ease-in-out infinite;
    }

    .next-btn:hover {
      background: white;
      color: #004e92;
      transform: scale(1.05);
      animation-play-state: paused;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) rotate(0deg); }
      25%  { transform: translate(5px, -6px) rotate(0.4deg); }
      50%  { transform: translate(-4px, 4px) rotate(-0.4deg); }
      75%  { transform: translate(3px, -3px) rotate(0.2deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    .concept {
      animation: none;
    }

    .lower-btn {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
    }

    .diary {
      animation: none;
    }

    .top-links {
      position: absolute;
      top: 25px;
      right: 40px;
      display: flex;
      gap: 35px;
    }

    .link-btn {
      position: relative;
      font-size: 1rem;
      color: #ffffffcc;
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    .link-btn::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 1px;
      background: white;
      transition: width 0.4s ease;
      opacity: 0.8;
    }

    .link-btn:hover {
      color: #fff;
    }

    .link-btn:hover::after {
      width: 100%;
    }
  </style>
</head>

<body>

  <div class="noise"></div>
  <div class="scanline"></div>
  <div class="vhs-warp"></div>

  <h1>１９４２の記録</h1>

  <div class="button-group">
    <button class="next-btn" style="animation-delay:0s" onclick="goNext('13.html')">01</button>
    <button class="next-btn" style="animation-delay:-2s" onclick="goNext('23.html')">02</button>
    <button class="next-btn" style="animation-delay:-4s" onclick="goNext('33.html')">03</button>
    <button class="next-btn" style="animation-delay:-6s" onclick="goNext('43.html')">04</button>
    <button class="next-btn" style="animation-delay:-1s" onclick="goNext('53.html')">05</button>
    <button class="next-btn" style="animation-delay:-3s" onclick="goNext('63.html')">06</button>
    <button class="next-btn" style="animation-delay:-5s" onclick="goNext('73.html')">07</button>

  </div>

  <div class="lower-btn">
    <a href="91.html" class="link-btn diary">私の日記</a>
  </div>

  <div class="top-links">
    <a href="index.html" class="link-btn">initial</a>
    <a href="concept.html" class="link-btn">concept</a>
    <a href="11.html" class="link-btn">diary</a>
  </div>

  <script>
    function goNext(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
