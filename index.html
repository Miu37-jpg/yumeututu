<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>phoenix intro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: sans-serif;
}

/* =====================
   背景動画（movie2）
===================== */
#bgVideo {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* 少し暗くするレイヤー */
#bgMask {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 1;
}

/* =====================
   メインレイヤー
===================== */
#intro {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 2;
  transition: opacity 1s ease;
}

/* =====================
   前景動画（movie1）
===================== */
#introVideo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  display: none;
  opacity: 0;
  transition: opacity 1s ease;
}

/* =====================
   ボタン
===================== */
#startBtn {
  position: relative;
  z-index: 3;
  padding: 1em 2.2em;
  font-size: 1.8em;
  background: transparent;
  color: #fff;
  border: 2px solid #fff;
  border-radius: 14px;
  cursor: pointer;
  letter-spacing: 0.2em;
  transition: all 0.4s ease;
}

#startBtn:hover {
  background: #fff;
  color: #000;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

#skipBtn {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 3;
  padding: 0.6em 1.2em;
  font-size: 1em;
  background: transparent;
  color: #fff;
  border: 1px solid #fff;
  border-radius: 8px;
  cursor: pointer;
  display: none;
}

/* =====================
   フェード
===================== */
#fadeOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  transition: opacity 1s ease;
}
</style>
</head>

<body>

<!-- 背景動画 -->
<video id="bgVideo" autoplay muted loop playsinline>
  <source src="images/movie4.mov" type="video/mp4">
</video>

<div id="bgMask"></div>

<!-- メイン -->
<div id="intro">

  <!-- 前景動画 -->
  <video id="introVideo" playsinline poster="images/intro-poster.png">
    <source src="images/movie1.mp4" type="video/mp4">
  </video>

  <button id="startBtn">START</button>
  <button id="skipBtn">SKIP</button>

</div>

<div id="fadeOverlay"></div>

<script>
const startBtn = document.getElementById("startBtn");
const skipBtn  = document.getElementById("skipBtn");
const introVideo = document.getElementById("introVideo");
const intro = document.getElementById("intro");
const overlay = document.getElementById("fadeOverlay");

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  skipBtn.style.display  = "block";

  introVideo.style.display = "block";
  requestAnimationFrame(() => {
    introVideo.style.opacity = 1;
  });

  introVideo.muted = true;
  introVideo.play().then(() => {
    introVideo.muted = false;
  });
});

introVideo.addEventListener("ended", fadeOut);
skipBtn.addEventListener("click", fadeOut);

function fadeOut() {
  intro.style.opacity = 0;
  overlay.style.opacity = 1;

  setTimeout(() => {
    window.location.href = "Introduction.html";
  }, 1000);
}
</script>

</body>
</html>
